<!DOCTYPE html>
<html>
<head>
<title>Math Learning V9 GOD MODE</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
display:inline-block;
margin-top:20px;
width:320px;
}

button,input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
font-size:16px;
}

button{background:#4CAF50;color:white;}

.shop{
background:#eee;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>🧮 Math GOD MODE</h1>

<div class="card">

<div id="login">
<input id="username" placeholder="Enter name">
<button onclick="start()">Start</button>
</div>

<div id="game" style="display:none;">

<p id="user"></p>
<p id="stats"></p>

<h2 id="question"></h2>

<input id="answer" placeholder="Answer"><br>

<button onclick="ask()">New Question</button>
<button onclick="check()">Submit</button>

<p id="result"></p>

<div class="shop">
<h3>🛒 Shop</h3>
<button onclick="buyLife()">❤️ Buy Life (5 coins)</button>
</div>

<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>

</div>

</div>

<script>
let userData={
name:"",
score:0,
level:1,
lives:3,
coins:0
};

let correctAnswer=0;

// load
if(localStorage.getItem("userData")){
userData=JSON.parse(localStorage.getItem("userData"));
}

// start
function start(){
userData.name=document.getElementById("username").value;
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";
updateUI();
updateBoard();
}

// random
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// ask
function ask(){
let type=rand(1,4);
let x=rand(1,20), y=rand(1,20);

if(type==1){
correctAnswer=x+y;
document.getElementById("question").innerText=x+" + "+y;
}
else if(type==2){
correctAnswer=x*y;
document.getElementById("question").innerText=x+" × "+y;
}
else if(type==3){
correctAnswer=x*x;
document.getElementById("question").innerText=x+"²";
}
else{
correctAnswer=y;
document.getElementById("question").innerText="Solve: x + "+x+" = "+(x+y);
}

document.getElementById("result").innerText="";
}

// check
function check(){
let user=document.getElementById("answer").value;

if(user==correctAnswer){
userData.score++;
userData.coins+=2;

if(userData.score%5===0){
userData.level++;
}

document.getElementById("result").innerText="✅ Correct!";
}
else{
userData.lives--;
document.getElementById("result").innerText=
"❌ Wrong! Answer: "+correctAnswer;
}

if(userData.lives<=0){
saveBoard();
alert("Game Over! Score: "+userData.score);
userData.score=0;
userData.level=1;
userData.lives=3;
userData.coins=0;
}

save();
updateUI();
}

// shop
function buyLife(){
if(userData.coins>=5){
userData.coins-=5;
userData.lives++;
updateUI();
save();
}
}

// save
function save(){
localStorage.setItem("userData",JSON.stringify(userData));
}

// UI
function updateUI(){
document.getElementById("user").innerText="👤 "+userData.name;
document.getElementById("stats").innerText=
"🏆 Level "+userData.level+
" | ❤️ "+userData.lives+
" | 💰 "+userData.coins+
" | Score "+userData.score;
}

// leaderboard
let board = JSON.parse(localStorage.getItem("board")) || [];

function saveBoard(){
board.push({name:userData.name,score:userData.score});
board.sort((a,b)=>b.score-a.score);
board=board.slice(0,5);
localStorage.setItem("board",JSON.stringify(board));
}

function updateBoard(){
let list=document.getElementById("leaderboard");
list.innerHTML="";
board.forEach(p=>{
let li=document.createElement("li");
li.innerText=p.name+" - "+p.score;
list.appendChild(li);
});
}
</script>

</body>
</html>
