<!DOCTYPE html>
<html>
<head>
<title>🧠 Brain Upgrade C20</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f2027;
color:white;
text-align:center;
}

.card{
margin-top:40px;
padding:25px;
width:360px;
background:#1c2b36;
border-radius:20px;
display:inline-block;
}

input,button{
padding:14px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
}

#question{font-size:26px;margin:15px;}
</style>
</head>

<body>

<h1>🧠 Brain Upgrade</h1>

<div class="card">

<p id="stats"></p>

<h2 id="question"></h2>

<input id="answer" placeholder="Answer"><br>
<button onclick="check()">Submit</button>

<p id="result"></p>

</div>

<script>
let score=0, level=1, lives=3;
let correctAnswer=0;
let locked=false;

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a;
}

function ask(){
locked=false;

let x=rand(1,20), y=rand(1,20);
correctAnswer=x+y;

document.getElementById("question").innerText=x+" + "+y;
document.getElementById("answer").value="";
document.getElementById("result").innerText="";
}

function check(){
if(locked) return;

let ans=document.getElementById("answer").value;
if(ans==="") return alert("Enter answer");

locked=true;

if(Number(ans)===correctAnswer){
score++;
if(score%5===0) level++;
document.getElementById("result").innerText="✅ Correct";
}else{
lives--;
document.getElementById("result").innerText="❌ "+correctAnswer;
}

if(lives<=0){
alert("Game Over");
score=0; level=1; lives=3;
}

updateUI();
setTimeout(()=>ask(),700);
}

function updateUI(){
document.getElementById("stats").innerText=
"🏆 L"+level+" | ❤️ "+lives+" | Score "+score;
}

ask();
</script>

</body>
</html>
