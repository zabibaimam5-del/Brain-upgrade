<!DOCTYPE html>
<html>
<head>
<title>🧠 Brain Upgrade</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#4facfe,#00f2fe);
text-align:center;
color:white;
}
.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
display:inline-block;
margin-top:30px;
width:320px;
}
button,input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
font-size:16px;
}
button{background:#4CAF50;color:white;}
</style>
</head>

<body>

<h1>🧠 Brain Upgrade</h1>

<div class="card">

<div id="login">
<input id="username" placeholder="Enter your name">
<button onclick="start()">Start</button>
</div>

<div id="game" style="display:none;">
<p id="stats"></p>

<h2 id="question"></h2>

<input id="answer" placeholder="Your answer"><br>

<button onclick="check()">Submit</button>

<p id="result"></p>

</div>

</div>

<script>
let user="";
let score=0;
let level=1;
let lives=3;
let correctAnswer=0;
let locked=false;

// START
function start(){
user=document.getElementById("username").value;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

updateUI();
ask();
}

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// ASK QUESTION
function ask(){
locked=false;

let x=rand(1,20), y=rand(1,20);
correctAnswer=x+y;

document.getElementById("question").innerText = x + " + " + y;
document.getElementById("answer").value = "";
document.getElementById("result").innerText = "";
}

// CHECK
function check(){
if(locked) return;
locked=true;

let ans=document.getElementById("answer").value;

if(ans == correctAnswer){
score++;
if(score % 5 === 0) level++;
document.getElementById("result").innerText="✅ Correct!";
}else{
lives--;
document.getElementById("result").innerText=
"❌ Wrong! Answer: " + correctAnswer;
}

if(lives <= 0){
alert("Game Over!");
score=0;
level=1;
lives=3;
}

updateUI();

// AUTO NEXT
setTimeout(()=>ask(),800);
}

// UI
function updateUI(){
document.getElementById("stats").innerText =
"🏆 Level " + level +
" | ❤️ " + lives +
" | Score " + score;
}
</script>

</body>
</html>
