<!DOCTYPE html>
<html>
<head>
<title>🧠 Brain Upgrade</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#4facfe,#00f2fe);
text-align:center;
color:white;
}
.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
display:inline-block;
margin-top:30px;
width:320px;
}
button,input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
font-size:16px;
}
button{background:#4CAF50;color:white;}
</style>
</head>

<body>

<h1>🧠 Brain Upgrade</h1>

<div class="card">

<div id="login">
<input id="username" placeholder="Enter your name">
<button onclick="start()">Start</button>
</div>

<div id="game" style="display:none;">

<p id="stats"></p>

<h2 id="question"></h2>

<input id="answer" placeholder="Your answer"><br>

<button onclick="check()">Submit</button>

<p id="result"></p>

<h3>🌐 Leaderboard</h3>
<ul id="leaderboard"></ul>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
// 🔥 PASTE YOUR REAL CONFIG HERE
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_APP.firebaseapp.com",
databaseURL: "https://brain-upgrade-default-rtdb.firebaseio.com/",
projectId: "YOUR_APP",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="";
let score=0;
let level=1;
let lives=3;
let correctAnswer=0;
let locked=false;

// START
function start(){
user=document.getElementById("username").value;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

loadUser();
ask();
}

// LOAD USER DATA
function loadUser(){
db.ref("users/"+user).once("value",(snap)=>{
if(snap.exists()){
let d=snap.val();
score=d.score;
level=d.level;
lives=d.lives;
}
updateUI();
updateLeaderboard();
});
}

// SAVE USER DATA
function saveUser(){
db.ref("users/"+user).set({
score:score,
level:level,
lives:lives
});
}

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// GENERATE QUESTION
function ask(){
locked=false;

let x=rand(1,20), y=rand(1,20);
correctAnswer=x+y;

document.getElementById("question").innerText = x + " + " + y;
document.getElementById("answer").value = "";
document.getElementById("result").innerText = "";
}

// CHECK ANSWER
function check(){
if(locked) return;
locked=true;

let ans=document.getElementById("answer").value;

if(ans == correctAnswer){
score++;
if(score % 5 === 0) level++;
document.getElementById("result").innerText="✅ Correct!";
}else{
lives--;
document.getElementById("result").innerText=
"❌ Wrong! Answer: " + correctAnswer;
}

if(lives <= 0){
alert("Game Over!");
score=0;
level=1;
lives=3;
}

saveUser();
updateUI();
updateLeaderboard();

// AUTO NEXT QUESTION
setTimeout(()=>ask(),800);
}

// UPDATE UI
function updateUI(){
document.getElementById("stats").innerText =
"🏆 Level " + level +
" | ❤️ " + lives +
" | Score " + score;
}

// LEADERBOARD
function updateLeaderboard(){
db.ref("users").once("value",(snap)=>{
let data=snap.val();
let arr=[];

for(let name in data){
arr.push({name:name,score:data[name].score});
}

arr.sort((a,b)=>b.score-a.score);

let list=document.getElementById("leaderboard");
list.innerHTML="";

arr.slice(0,5).forEach(p=>{
let li=document.createElement("li");
li.innerText = p.name + " - " + p.score;
list.appendChild(li);
});
});
}
</script>

</body>
                    </html>
